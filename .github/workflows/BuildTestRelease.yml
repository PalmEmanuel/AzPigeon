name: Build Test Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build-test:
    name: Build and Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.0'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          useConfigFile: true

      - name: Build Module
        shell: pwsh
        run: ./build.ps1 -Tasks build

      - name: Install Azurite
        run: npm install -g azurite
        shell: bash
        
      - name: Run Pester Integration Tests
        shell: pwsh
        run: ./build.ps1 -Tasks test -PesterTag Integration

      - name: Upload Build Output
        uses: actions/upload-artifact@v7
        with:
          name: output
          path: output

  release:
    name: Publish to GitHub and PowerShell Gallery
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Build Output
        uses: actions/download-artifact@v8
        with:
          name: output
          path: output

      - name: Publish Module to PSGallery
        shell: pwsh
        run: Import-Module ./output/RequiredModules/PowerShellForGitHub; ./build.ps1 -Tasks publish
        env:
          GitHubToken: ${{ secrets.GITHUB_TOKEN }}
          GalleryApiToken: ${{ secrets.PSGALLERY_KEY }}

      - name: Send Changelog PR
        shell: pwsh
        run: ./build.ps1 -tasks Create_ChangeLog_GitHub_PR
        env:
          GitHubToken: ${{ secrets.GITHUB_TOKEN }}